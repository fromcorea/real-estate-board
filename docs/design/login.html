<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>집구하자 - 로그인</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="common.css" rel="stylesheet">
</head>
<body class="bg-light">

<!-- GNB -->
<nav class="navbar navbar-expand-lg navbar-dark bg-primary sticky-top">
    <div class="container">
        <a class="navbar-brand fw-bold" href="index.html">
            <i class="bi bi-house-door-fill me-1"></i>집구하자
        </a>
    </div>
</nav>

<!-- 로그인 폼 -->
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card shadow-sm border-0 rounded-3">
                <div class="card-body p-5">
                    <h3 class="fw-bold text-center mb-4">로그인</h3>

                    <form>
                        <!-- 아이디 -->
                        <div class="mb-3">
                            <label class="form-label fw-semibold">아이디</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="bi bi-person"></i></span>
                                <input type="text" class="form-control" placeholder="아이디를 입력하세요">
                            </div>
                        </div>

                        <!-- 비밀번호 -->
                        <div class="mb-3">
                            <label class="form-label fw-semibold">비밀번호</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="bi bi-lock"></i></span>
                                <input type="password" class="form-control" placeholder="비밀번호를 입력하세요">
                            </div>
                        </div>

                        <!-- 로그인 유지 & 비밀번호 찾기 -->
                        <div class="d-flex justify-content-between align-items-center mb-4">
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" id="rememberMe">
                                <label class="form-check-label small" for="rememberMe">로그인 유지</label>
                            </div>
                            <a href="#" class="small text-muted text-decoration-none">비밀번호 찾기</a>
                        </div>

                        <!-- 에러 메시지 (예시) -->
                        <div class="alert alert-danger py-2 small d-none">
                            <i class="bi bi-exclamation-circle me-1"></i>
                            아이디 또는 비밀번호가 일치하지 않습니다.
                        </div>

                        <!-- 로그인 버튼 -->
                        <button type="submit" class="btn btn-primary w-100 btn-lg mb-3">로그인</button>

                        <hr>

                        <p class="text-center mb-0">
                            아직 회원이 아니신가요? <a href="signup.html">회원가입</a>
                        </p>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
