<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>집구하자 - 회원가입</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="common.css" rel="stylesheet">
</head>
<body class="bg-light">

<!-- GNB -->
<nav class="navbar navbar-expand-lg navbar-dark bg-primary sticky-top">
    <div class="container">
        <a class="navbar-brand fw-bold" href="index.html">
            <i class="bi bi-house-door-fill me-1"></i>집구하자
        </a>
    </div>
</nav>

<!-- 회원가입 폼 -->
<div class="container py-5">
    <div class="form-section">
        <div class="card shadow-sm border-0 rounded-3">
            <div class="card-body p-5">
                <h3 class="fw-bold text-center mb-4">회원가입</h3>

                <form>
                    <!-- 아이디 -->
                    <div class="mb-3">
                        <label class="form-label fw-semibold">아이디 <span class="text-danger">*</span></label>
                        <div class="input-group">
                            <input type="text" class="form-control" placeholder="영문, 숫자 4~20자">
                            <button class="btn btn-outline-primary" type="button">중복확인</button>
                        </div>
                        <div class="form-text text-success"><i class="bi bi-check-circle"></i> 사용 가능한 아이디입니다.</div>
                    </div>

                    <!-- 이메일 -->
                    <div class="mb-3">
                        <label class="form-label fw-semibold">이메일 <span class="text-danger">*</span></label>
                        <input type="email" class="form-control" placeholder="example@email.com">
                    </div>

                    <!-- 비밀번호 -->
                    <div class="mb-3">
                        <label class="form-label fw-semibold">비밀번호 <span class="text-danger">*</span></label>
                        <input type="password" class="form-control" placeholder="영문, 숫자, 특수문자 포함 8자 이상">
                        <div class="mt-2">
                            <div class="progress" style="height: 4px;">
                                <div class="progress-bar bg-warning" style="width: 60%"></div>
                            </div>
                            <small class="text-warning">보통</small>
                        </div>
                    </div>

                    <!-- 비밀번호 확인 -->
                    <div class="mb-3">
                        <label class="form-label fw-semibold">비밀번호 확인 <span class="text-danger">*</span></label>
                        <input type="password" class="form-control" placeholder="비밀번호를 다시 입력하세요">
                    </div>

                    <!-- 이름 -->
                    <div class="mb-3">
                        <label class="form-label fw-semibold">이름 <span class="text-danger">*</span></label>
                        <input type="text" class="form-control" placeholder="실명을 입력하세요">
                    </div>

                    <!-- 전화번호 -->
                    <div class="mb-3">
                        <label class="form-label fw-semibold">전화번호</label>
                        <input type="tel" class="form-control" placeholder="010-0000-0000">
                    </div>

                    <!-- 프로필 사진 -->
                    <div class="mb-3">
                        <label class="form-label fw-semibold">프로필 사진</label>
                        <input type="file" class="form-control" accept="image/*">
                    </div>

                    <hr>

                    <!-- 공인중개사 -->
                    <div class="mb-3">
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" id="isAgent">
                            <label class="form-check-label fw-semibold" for="isAgent">
                                공인중개사입니다
                            </label>
                        </div>
                    </div>

                    <!-- 사업자등록번호 (중개사 체크 시 표시) -->
                    <div class="mb-3 ps-4" id="agentFields">
                        <label class="form-label fw-semibold">사업자등록번호 <span class="text-danger">*</span></label>
                        <input type="text" class="form-control" placeholder="000-00-00000">
                        <div class="form-text">공인중개사 인증을 위해 필요합니다.</div>
                    </div>

                    <hr>

                    <!-- 약관 동의 -->
                    <div class="mb-4">
                        <div class="form-check mb-2">
                            <input class="form-check-input" type="checkbox" id="agreeAll">
                            <label class="form-check-label fw-bold" for="agreeAll">전체 동의</label>
                        </div>
                        <div class="form-check mb-1 ps-5">
                            <input class="form-check-input" type="checkbox" id="agree1">
                            <label class="form-check-label small" for="agree1">
                                [필수] 이용약관 동의 <a href="#" class="text-muted">보기</a>
                            </label>
                        </div>
                        <div class="form-check mb-1 ps-5">
                            <input class="form-check-input" type="checkbox" id="agree2">
                            <label class="form-check-label small" for="agree2">
                                [필수] 개인정보 수집 및 이용 동의 <a href="#" class="text-muted">보기</a>
                            </label>
                        </div>
                        <div class="form-check ps-5">
                            <input class="form-check-input" type="checkbox" id="agree3">
                            <label class="form-check-label small" for="agree3">
                                [선택] 마케팅 정보 수신 동의
                            </label>
                        </div>
                    </div>

                    <!-- 가입 버튼 -->
                    <button type="submit" class="btn btn-primary w-100 btn-lg">가입하기</button>
                </form>

                <p class="text-center mt-3 mb-0">
                    이미 계정이 있으신가요? <a href="login.html">로그인</a>
                </p>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
