{% extends 'base.html' %}
{% block title %}서버 오류 - 집구하자{% endblock %}

{% block content %}
<div class="container text-center py-5">
    <div class="py-5">
        <i class="bi bi-exclamation-triangle display-1 text-warning"></i>
        <h2 class="fw-bold mt-4">서버 오류가 발생했습니다</h2>
        <p class="text-muted mb-4">잠시 후 다시 시도해주세요. 문제가 계속되면 관리자에게 문의하세요.</p>
        <div class="d-flex gap-2 justify-content-center">
            <a href="javascript:history.back()" class="btn btn-outline-secondary">
                <i class="bi bi-arrow-left me-1"></i>이전 페이지
            </a>
            <a href="{% url 'home' %}" class="btn btn-primary">
                <i class="bi bi-house-door me-1"></i>홈으로
            </a>
        </div>
    </div>
</div>
{% endblock %}
