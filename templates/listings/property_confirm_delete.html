{% extends 'base.html' %}
{% block title %}매물 삭제 - 집구하자{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card border-0 shadow-sm">
                <div class="card-body p-4 text-center">
                    <i class="bi bi-exclamation-triangle display-3 text-danger mb-3"></i>
                    <h4 class="fw-bold mb-3">매물을 삭제하시겠습니까?</h4>
                    <p class="text-muted mb-4">
                        <strong>"{{ object.title }}"</strong> 매물이 영구적으로 삭제됩니다.<br>
                        이 작업은 되돌릴 수 없습니다.
                    </p>
                    <div class="d-flex justify-content-center gap-2">
                        <a href="{% url 'listings:detail' object.pk %}" class="btn btn-outline-secondary px-4">취소</a>
                        <form method="post">
                            {% csrf_token %}
                            <button type="submit" class="btn btn-danger px-4">
                                <i class="bi bi-trash me-1"></i>삭제하기
                            </button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
