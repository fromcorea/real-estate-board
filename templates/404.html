{% extends 'base.html' %}
{% block title %}페이지를 찾을 수 없습니다 - 집구하자{% endblock %}

{% block content %}
<div class="container text-center py-5">
    <div class="py-5">
        <i class="bi bi-house-slash display-1 text-muted"></i>
        <h2 class="fw-bold mt-4">페이지를 찾을 수 없습니다</h2>
        <p class="text-muted mb-4">요청하신 페이지가 존재하지 않거나 이동되었습니다.</p>
        <div class="d-flex gap-2 justify-content-center">
            <a href="javascript:history.back()" class="btn btn-outline-secondary">
                <i class="bi bi-arrow-left me-1"></i>이전 페이지
            </a>
            <a href="{% url 'home' %}" class="btn btn-primary">
                <i class="bi bi-house-door me-1"></i>홈으로
            </a>
        </div>
    </div>
</div>
{% endblock %}
