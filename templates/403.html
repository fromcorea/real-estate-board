{% extends 'base.html' %}
{% block title %}접근 권한 없음 - 집구하자{% endblock %}

{% block content %}
<div class="container text-center py-5">
    <div class="py-5">
        <i class="bi bi-shield-lock display-1 text-danger"></i>
        <h2 class="fw-bold mt-4">접근 권한이 없습니다</h2>
        <p class="text-muted mb-4">이 페이지에 접근할 수 있는 권한이 없습니다.</p>
        <div class="d-flex gap-2 justify-content-center">
            <a href="javascript:history.back()" class="btn btn-outline-secondary">
                <i class="bi bi-arrow-left me-1"></i>이전 페이지
            </a>
            <a href="{% url 'home' %}" class="btn btn-primary">
                <i class="bi bi-house-door me-1"></i>홈으로
            </a>
        </div>
    </div>
</div>
{% endblock %}
